<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder Website</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("https://images.unsplash.com/photo-1498050108023-c5249f4df085") no-repeat center center fixed;
    background-size: cover;
}

/* Overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* Navbar */
.navbar {
    background: rgba(0,0,0,0.8);
    padding: 12px;
    text-align: center;
}

.navbar a {
    color: white;
    margin: 20px;
    cursor: pointer;
    font-weight: bold;
}

/* Sections */
.section {
    display: none;
    width: 85%;
    margin: 30px auto;
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 10px;
}

/* Active */
.active {
    display: block;
}

/* Dark Mode */
.dark {
    background: #121212;
}

.dark .section {
    background: #1e1e1e;
    color: white;
}

.dark input, .dark textarea, .dark select {
    background: #2c2c2c;
    color: white;
}

/* Inputs */
input, textarea, select {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
}

/* Buttons */
.btn {
    padding: 10px;
    margin-top: 10px;
}

.download {
    background: blue;
    color: white;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('resume')">Resume Builder</a>
    <a onclick="showPage('form')">Register</a>
</div>

<!-- DARK MODE -->
<div style="text-align:center; margin:10px;">
    <button onclick="toggleMode()">🌙 Toggle Dark Mode</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
    <h1>Welcome to Resume Builder</h1>
    <p>Create your resume easily and register your details.</p>
</div>

<!-- RESUME -->
<div id="resume" class="section">

<div style="display:flex; justify-content:space-between; align-items:center;">

    <div style="width:70%;">
        <h2 contenteditable="true">Your Name</h2>
        <input type="text" placeholder="Email | Phone | Location">
        <input type="text" placeholder="LinkedIn URL">
    </div>

    <div style="width:25%; text-align:center;">
        <label>Upload Photo</label>
        <input type="file">
        <br><br>
        <img src="images.jpeg" width="120" height="120" style="border-radius:10px;">
    </div>

</div>

<h3>Profile</h3>
<textarea rows="3"></textarea>

<h3>Education</h3>
<input type="text" placeholder="Degree, College">
<input type="text" placeholder="Year | CGPA">
<input type="text" placeholder="PUC">
<input type="text" placeholder="SSLC">

<h3>Skills</h3>
<textarea rows="2"></textarea>

<h3>Internship</h3>
<input type="text" placeholder="Company | Role">
<textarea rows="2"></textarea>

<h3>Projects</h3>
<input type="text" placeholder="Project 1 Title">
<textarea rows="2"></textarea>

<input type="text" placeholder="Project 2 Title">
<textarea rows="2"></textarea>

<input type="text" placeholder="Project 3 Title">
<textarea rows="2"></textarea>

<h3>Certificates</h3>
<textarea rows="2"></textarea>

<h3>Languages</h3>
<input type="text" placeholder="English, Kannada, Hindi">

<button class="btn download" onclick="window.print()">Download Resume (PDF)</button>

</div>

<!-- FORM -->
<div id="form" class="section">

<h2>Student Registration Form</h2>

<form>

<fieldset>
<legend>Personal Information</legend>

<label>Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Mobile</label>
<input type="tel">

<label>Password</label>
<input type="password" required>

<label>Age</label>
<input type="number">

<label>DOB</label>
<input type="date">

<label>Gender</label><br>
<input type="radio" name="g"> Male
<input type="radio" name="g"> Female
<br><br>

</fieldset>

<fieldset>
<legend>General Info</legend>

<label>Profile URL</label>
<input type="url">

<label>Upload PAN</label>
<input type="file">

<label>Rating</label>
<input type="range" min="1" max="5">

<label>Payment</label><br>
<input type="checkbox"> Cash
<input type="checkbox"> UPI
<input type="checkbox"> RazorPay
<br><br>

<label>Tech Stack</label>
<select multiple>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
</select>

</fieldset>

<fieldset>
<legend>Captcha</legend>
<label>Enter: <b>AB12X</b></label>
<input type="text" required>
</fieldset>

<label>Comments</label>
<textarea rows="3"></textarea>

<div style="display:flex; justify-content:space-between;">
<input type="submit" class="btn">
<input type="reset" class="btn">
</div>

</form>

</div>

<!-- SCRIPT -->
<script>
function showPage(page) {
    let sections = document.querySelectorAll('.section');
    sections.forEach(sec => sec.classList.remove('active'));

    document.getElementById(page).classList.add('active');
}

function toggleMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
